                options: ["Entre 0,8 y 1,0 para maximizar la capacidad de bombeo de calor (Qmax).", "Cerca de 0,1 para minimizar el efecto Joule parásito.", "Entre 0,3 y 0,6 para equilibrar el calor extraído frente a la energía eléctrica consumida.", "Exactamente en 1,0 para alcanzar el ΔTmax especificado por el fabricante."],

            {

            {

            {

                explanation: "Correcta (b): La arquitectura de Nivel 1 minimiza la resistencia térmica de interfaz al colocar el TEC lo más cerca posible del die."
            },
            {

                explanation: "Correcta (b): El enfriamiento sub-ambiente reduce tensiones de umbral y permite overclocking estable."
            },

                text: "Al diagnosticar un sistema que sufre throttling térmico a pesar de tener un TEC, se detecta que el sensor de temperatura tiene una tasa de muestreo de 10 Hz. ¿Por qué esto es un error de diseño?",
                options: ["Porque los termopares tipo K solo funcionan a frecuencias superiores a 1 kHz.", "Porque se requiere una tasa de muestreo de 1 kHz para igualar la respuesta rápida del TEC ante burst térmicos.", "Porque a 10 Hz el algoritmo PID consume demasiada memoria en la FPGA.", "Porque el ripple de corriente se vuelve infinito a bajas frecuencias de muestreo."],
                correct: "b",
                explanation: "Correcta (b): El sistema necesita alta tasa de muestreo (~1 kHz) para igualar la respuesta rápida del TEC y evitar throttling."
            },
            {
                topic: "TEC · Edge",
                text: "En un escenario de Edge Computing con temperaturas ambientales de +70°C, ¿cómo ayuda el control bidireccional del TEC?",
                options: ["Permite usar el TEC como generador de energía para alimentar el sensor de temperatura.", "Permite enfriar activamente el acelerador y mantener una latencia de inferencia constante.", "Evita que el aire caliente del entorno entre en contacto con el rack.", "Reduce la humedad relativa dentro del encapsulado del ASIC."],
                correct: "b",
                explanation: "Correcta (b): El control activo compensa variaciones ambientales extremas, garantizando estabilidad operativa en el edge."
            },
            {
                topic: "TEC · Matriz",
                text: "Un ASIC de IA tiene un perfil térmico no uniforme. ¿Qué arquitectura de integración es la más adecuada para gestionar hotspots sub-die específicos?",
                options: ["Refrigeración por aire con heatsinks de aluminio de gran tamaño.", "Matrices de múltiples TECs pequeños (Nivel 3) posicionados sobre los hotspots.", "Inmersión en líquido monofásico para uniformar la temperatura global.", "Aumento de la frecuencia de reloj en las zonas frías del die."],
                correct: "b",
                explanation: "Correcta (b): Múltiples TECs (Nivel 3) permiten gestión granular y localizada del calor en superficies no uniformes."
            },
            {
                topic: "TEC · ZT",
                text: "¿Cuál es el impacto de la Figura de Mérito (ZT) en el diseño de futuros sistemas de refrigeración?",
                options: ["Un mayor ZT indica que el material es más pesado y difícil de integrar.", "Un aumento en ZT permite duplicar la eficiencia de enfriamiento y mejorar el COP.", "ZT es un parámetro puramente teórico que no afecta al rendimiento real.", "Cuanto mayor es el ZT, mayor es el riesgo de fugas de refrigerante."],
                correct: "b",
                explanation: "Correcta (b): El avance en ZT (de 1,2 a >2,0) mejora drásticamente la eficiencia de los módulos termoeléctricos."
            },
            {
                topic: "TEC · Coldplate",
                text: "Un sistema híbrido utiliza un TEC acoplado a un coldplate de cobre (Nivel 2). ¿Qué función cumple el coldplate en este diseño?",
                options: ["Actúa como la cara fría que absorbe el calor del silicio.", "Sirve para evacuar el calor de la cara caliente del TEC hacia un sistema secundario.", "Sustituye al material semiconductor tipo N para reducir costes.", "Genera la corriente eléctrica necesaria para alimentar el módulo Peltier."],
                correct: "b",
                explanation: "Correcta (b): El coldplate evacua el calor acumulado en la cara caliente del TEC hacia un sistema secundario."
            },
            {
                topic: "TEC · PUE",
                text: "¿Qué problema de la refrigeración por aire convencional se vuelve 'inaceptable' al superar los 20-30 kW por rack?",
                options: ["El consumo de agua destilada.", "El ruido acústico y la degradación del PUE.", "La falta de conductores de cobre en los ventiladores.", "La imposibilidad de usar filtros de aire HEPA."],
                correct: "b",
                explanation: "Correcta (b): A altas densidades, el ruido y la ineficiencia energética (PUE) de los sistemas por aire llegan a límites inaceptables."
            },
            {
                topic: "TEC · TCO",
                text: "En el contexto del TCO (Total Cost of Ownership), ¿cómo se justifica el alto consumo eléctrico de un módulo Peltier (COP 0,3-0,7)?",
                options: ["Porque el TEC genera electricidad sobrante que se devuelve a la red.", "Porque evitar un fallo prematuro o una pérdida de rendimiento del 15-30% compensa el coste energético.", "Porque el gobierno ofrece subsidios para tecnologías de estado sólido.", "Porque los TECs eliminan la necesidad de pagar licencias de software de gestión térmica."],
                correct: "b",
                explanation: "Correcta (b): El coste operativo extra es despreciable frente a las pérdidas por throttling o fallo del hardware."
            },
            {
                topic: "TEC · Estado Sólido",
                text: "¿Qué ventaja ofrece el estado sólido total de los TECs en comparación con los sistemas DLC?",
                options: ["Capacidad de enfriar mayores superficies por centímetro cuadrado.", "Ausencia de partes móviles y de riesgo de fugas de fluidos.", "Menor coste inicial de adquisición de materiales.", "Posibilidad de funcionar sin necesidad de alimentación DC."],
                correct: "b",
                explanation: "Correcta (b): Al no tener fluidos ni partes móviles, se eliminan riesgos de mantenimiento y fallos mecánicos."
            },
            {
                topic: "TEC · Throttling",
                text: "Para un sistema de entrenamiento de modelos de IA a gran escala, ¿qué beneficio reporta mantener la T_junction constante?",
                options: ["Permite reducir el tamaño de las fuentes de alimentación del servidor.", "Elimina el throttling térmico que degrada el rendimiento en sesiones prolongadas.", "Cambia la arquitectura de la red neuronal de Transformer a CNN de forma automática.", "Reduce la latencia de red entre los nodos del clúster."],
                correct: "b",
                explanation: "Correcta (b): Mantener temperatura constante evita el throttling, maximizando el rendimiento computacional neto."
            },
            {
                topic: "TEC · Retrofit",
                text: "Al realizar un 'Retrofit' de tecnología Peltier sobre hardware existente, ¿cuál es la principal desventaja mencionada?",
                options: ["El sistema se vuelve demasiado ligero y pierde estabilidad mecánica.", "El coste es de 3 a 5 veces superior al de una integración nativa en el diseño original.", "Los TECs no pueden instalarse si el hardware ya ha sido encendido una vez.", "Se requiere cambiar todo el sistema operativo para reconocer el módulo Peltier."],
                correct: "b",
                explanation: "Correcta (b): La integración nativa es mucho más eficiente en costes que adaptar la tecnología a sistemas ya diseñados (retrofit)."
            }
        ];

        const LETTERS = ['a', 'b', 'c', 'd'];

        function shuffleQuestionOptions(originalQ) {
            const items = originalQ.options.map((text, idx) => ({ text, origIndex: idx }));
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            const newOptions = items.map(item => item.text);
            const origCorrectIdx = LETTERS.indexOf(originalQ.correct);
            let newCorrectIdx = -1;
            for (let i = 0; i < items.length; i++) {
                if (items[i].origIndex === origCorrectIdx) {
                    newCorrectIdx = i;
                    break;
                }
            }
            const newCorrectLetter = LETTERS[newCorrectIdx];
            let newExplanation = originalQ.explanation;
            const regex = /^Correcta \([a-d]\):\s*/i;
            const match = newExplanation.match(regex);
            if (match) {
                const rest = newExplanation.substring(match[0].length);
                newExplanation = `Correcta (${newCorrectLetter}): ${rest}`;
            }
            return {
                topic: originalQ.topic,
                text: originalQ.text,
                options: newOptions,
                correct: newCorrectLetter,
                explanation: newExplanation
            };
        }

        const TOTAL_QUESTIONS = 10;
        let currentExamQuestions = [];
        let userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
        let examCorrected = false;

        const questionsContainer = document.getElementById('questionsContainer');
        const correctBtn = document.getElementById('correctBtn');
        const newExamBtn = document.getElementById('newExamBtn');
        const scoreSummary = document.getElementById('scoreSummary');
        const liveScoreDisplay = document.getElementById('liveScoreDisplay');
        const questionCountSpan = document.getElementById('questionCount');
        const topicMixSpan = document.getElementById('topicMix');
        const toTopBtn = document.getElementById('toTopBtn');

        function initNewExam() {
            const selectedIndices = [];
            while (selectedIndices.length < TOTAL_QUESTIONS) {
                const r = Math.floor(Math.random() * fullBank.length);
                if (!selectedIndices.includes(r)) selectedIndices.push(r);
            }
            currentExamQuestions = selectedIndices.map(idx => shuffleQuestionOptions(fullBank[idx]));
            userAnswers = new Array(TOTAL_QUESTIONS).fill(null);
            examCorrected = false;
            scoreSummary.classList.remove('show');
            scoreSummary.innerHTML = '';
            liveScoreDisplay.textContent = '⭐ Puntuación: — / 10';
            questionCountSpan.textContent = `📋 ${TOTAL_QUESTIONS} preguntas`;
            const topics = [...new Set(currentExamQuestions.map(q => q.topic))];
            topicMixSpan.textContent = `🎯 Temas: ${topics.slice(0, 4).join(', ')}${topics.length > 4 ? '...' : ''}`;
            renderAllQuestions();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveAnswer(index, letter) {
            if (examCorrected) return;
            userAnswers[index] = letter;
            updateLiveScorePreview();
            updateQuestionBlockVisual(index);
        }

        function updateLiveScorePreview() {
            let correctCount = 0;
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                if (userAnswers[i] && userAnswers[i] === currentExamQuestions[i].correct) correctCount++;
            }
            liveScoreDisplay.textContent = `⭐ Puntuación: ${correctCount} / ${TOTAL_QUESTIONS}`;
        }

        function updateQuestionBlockVisual(index) {
            const block = document.getElementById(`q-block-${index}`);
            if (!block) return;
            block.classList.remove('answered-correct', 'answered-incorrect');
            if (examCorrected) {
                const q = currentExamQuestions[index];
                const userAns = userAnswers[index];
                if (userAns) {
                    block.classList.add(userAns === q.correct ? 'answered-correct' : 'answered-incorrect');
                }
            }
            if (examCorrected) {
                const fbEl = document.getElementById(`fb-${index}`);
                if (fbEl) updateFeedbackElement(fbEl, index);
            }
        }

        function renderAllQuestions() {
            let html = '';
            currentExamQuestions.forEach((q, idx) => {
                const selected = userAnswers[idx];
                const disabledAttr = examCorrected ? 'disabled' : '';
                let blockClass = '';
                if (examCorrected && selected) {
                    blockClass = selected === q.correct ? 'answered-correct' : 'answered-incorrect';
                }
                html += `
                <div class="question-block ${blockClass}" id="q-block-${idx}">
                    <div class="q-header">
                        <span class="q-num">📌 Pregunta ${idx + 1} de ${TOTAL_QUESTIONS}</span>
                        <span class="q-topic">🔖 ${q.topic}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options" id="options-${idx}">
                `;
                q.options.forEach((opt, optIdx) => {
                    const letter = LETTERS[optIdx];
                    const isChecked = (selected === letter);
                    html += `
                        <div class="option" data-letter="${letter}" data-qindex="${idx}">
                            <input type="radio" name="q_${idx}" value="${letter}" id="opt_${idx}_${letter}" ${isChecked ? 'checked' : ''} ${disabledAttr}>
                            <label for="opt_${idx}_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                        </div>
                    `;
                });
                html += `
                    </div>
                    <div class="feedback-line ${examCorrected ? 'show' : ''} ${examCorrected ? (selected === q.correct ? 'correct-fb' : (selected ? 'incorrect-fb' : 'pending-fb')) : ''}" id="fb-${idx}">
                        ${examCorrected ? getFeedbackText(idx) : ''}
                    </div>
                </div>
                `;
            });
            questionsContainer.innerHTML = html;

            document.querySelectorAll('.option').forEach(div => {
                const qIndex = parseInt(div.getAttribute('data-qindex'));
                const letter = div.getAttribute('data-letter');
                const radio = div.querySelector('input[type="radio"]');
                if (radio) {
                    radio.addEventListener('change', () => {
                        if (radio.checked) saveAnswer(qIndex, letter);
                    });
                }
                div.addEventListener('click', (e) => {
                    if (examCorrected) return;
                    if (e.target.tagName !== 'INPUT') {
                        const radioInside = div.querySelector('input');
                        if (radioInside && !radioInside.checked) {
                            radioInside.checked = true;
                            saveAnswer(qIndex, letter);
                        }
                    }
                });
            });
            updateLiveScorePreview();
        }

        function getFeedbackText(index) {
            const q = currentExamQuestions[index];
            const userAns = userAnswers[index];
            if (!userAns) {
                const correctIdx = LETTERS.indexOf(q.correct);
                return `⚠️ <strong>Sin responder.</strong> La respuesta correcta es ${q.correct.toUpperCase()}) ${q.options[correctIdx]}.<br>${q.explanation}`;
            }
            if (userAns === q.correct) {
                return `✅ <strong>¡Correcto!</strong> ${q.explanation}`;
            } else {
                const correctIdx = LETTERS.indexOf(q.correct);
                return `❌ <strong>Incorrecto.</strong> La respuesta correcta es ${q.correct.toUpperCase()}) ${q.options[correctIdx]}.<br>${q.explanation}`;
            }
        }

        function updateFeedbackElement(fbEl, index) {
            const q = currentExamQuestions[index];
            const userAns = userAnswers[index];
            fbEl.innerHTML = getFeedbackText(index);
            fbEl.classList.remove('correct-fb', 'incorrect-fb', 'pending-fb');
            if (!userAns) fbEl.classList.add('pending-fb');
            else if (userAns === q.correct) fbEl.classList.add('correct-fb');
            else fbEl.classList.add('incorrect-fb');
            fbEl.classList.add('show');
        }

        function correctExam() {
            if (examCorrected) {
                alert('El examen ya fue corregido. Presiona "Nueva Prueba" para generar otra evaluación.');
                return;
            }
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (!confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. Las no respondidas contarán como incorrectas. ¿Deseas continuar?`)) return;
            }
            examCorrected = true;
            let correctCount = 0;
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                if (userAnswers[i] === currentExamQuestions[i].correct) correctCount++;
            }
            for (let i = 0; i < TOTAL_QUESTIONS; i++) {
                const block = document.getElementById(`q-block-${i}`);
                const fbEl = document.getElementById(`fb-${i}`);
                const q = currentExamQuestions[i];
                const userAns = userAnswers[i];
                const radios = document.querySelectorAll(`input[name="q_${i}"]`);
                radios.forEach(r => r.disabled = true);
                if (block) {
                    block.classList.remove('answered-correct', 'answered-incorrect');
                    if (userAns) block.classList.add(userAns === q.correct ? 'answered-correct' : 'answered-incorrect');
                }
                if (fbEl) updateFeedbackElement(fbEl, i);
            }
            const percent = Math.round((correctCount / TOTAL_QUESTIONS) * 100);
            let emoji = '🌟', message = '';
            if (percent >= 90) { emoji = '🏆'; message = '¡Excelente dominio de los conceptos!'; }
            else if (percent >= 70) { emoji = '👍'; message = 'Buen trabajo, repasa algunos temas.'; }
            else if (percent >= 50) { emoji = '📚'; message = 'Necesitas reforzar varios conceptos clave.'; }
            else { emoji = '💪'; message = 'Es recomendable repasar todo el material.'; }
            scoreSummary.innerHTML = `${emoji} <strong>Resultado:</strong> ${correctCount} de ${TOTAL_QUESTIONS} aciertos (${percent}%)<br><span style="font-size:0.9rem;">${message}</span>`;
            scoreSummary.classList.add('show');
            liveScoreDisplay.textContent = `⭐ Puntuación: ${correctCount} / ${TOTAL_QUESTIONS}`;
            scoreSummary.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function newExam() {
            if (examCorrected || userAnswers.some(a => a !== null)) {
                if (!confirm('¿Generar una nueva prueba aleatoria? Se perderán las respuestas actuales.')) return;
            }
            initNewExam();
        }

        correctBtn.addEventListener('click', correctExam);
        newExamBtn.addEventListener('click', newExam);
        window.addEventListener('scroll', () => {
            toTopBtn.style.display = window.scrollY > 500 ? 'flex' : 'none';
        });
        toTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

        initNewExam();
    })();
</script>
